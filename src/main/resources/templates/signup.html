<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ResumeATS - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #14B8A6;
            --primary-hover: #0D9488;
            --bg-color: #F8FAFC;
            --white: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
        }

        body.dark-mode {
            --bg-color: #0F172A;
            --white: #1E293B;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .theme-toggle-auth {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: none;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
        }

        .split-left {
            flex: 1;
            background-color: var(--primary);
            color: var(--white);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--white);
        }

        .logo-icon {
            background-color: rgba(255,255,255,0.2);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg { width: 24px; height: 24px; }
        .logo-text { display: flex; flex-direction: column; }
        .logo-title { font-weight: 700; font-size: 1.25rem; line-height: 1.2; }
        .logo-subtitle { font-size: 0.8rem; opacity: 0.9; }

        .brand-content { margin-top: -10vh; max-width: 450px; }
        .brand-content h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 1rem; }
        .brand-content p { font-size: 1.05rem; line-height: 1.6; opacity: 0.95; margin-bottom: 2.5rem; }

        .copyright { font-size: 0.8rem; opacity: 0.8; }

        .split-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            background-color: var(--bg-color);
            position: relative;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-container h2 { font-size: 1.75rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem; }
        .auth-container p.subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }

        .input-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg.icon-left {
            position: absolute;
            left: 14px;
            width: 18px; height: 18px;
            color: #94A3B8;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: var(--white);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus { border-color: var(--primary); }

        .btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 0.85rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover { background-color: var(--primary-hover); }

        .auth-switch {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-switch a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .auth-switch a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .split-left { padding: 2rem; }
            .brand-content { margin-top: 2rem; }
            .split-right { padding: 2rem 1rem; }
            .theme-toggle-auth { top: 1rem; right: 1rem; }
        }
    </style>
</head>
<body>

    <div class="split-left">
        <a href="/" class="logo-container">
            <div class="logo-icon">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" opacity="0.3"></path><path d="M14.5 2v5.5H20L14.5 2zM9 10h6v2H9v-2zm0 4h6v2H9v-2zm0 4h4v2H9v-2z"></path></svg>
            </div>
            <div class="logo-text">
                <span class="logo-title">ResumeATS</span>
                <span class="logo-subtitle">AI-Powered Resume Analysis</span>
            </div>
        </a>

        <div class="brand-content">
            <h1>Create Account</h1>
            <p>Start optimizing your resume and landing more interviews.</p>
        </div>

        <div class="copyright">
            &copy; 2026 ResumeATS.
        </div>
    </div>

    <div class="split-right">
        <button class="theme-toggle-auth" id="themeToggle" title="Toggle Theme">
            <svg id="sunIcon" style="display:none;" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l.707.707M6.343 6.343l.707.707M12 7a5 5 0 100 10 5 5 0 000-10z"></path></svg>
            <svg id="moonIcon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
        <div class="auth-container">
            <h2>Sign Up</h2>
            <p class="subtitle">Join thousands of job seekers</p>
            
            <form id="signupForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <svg class="icon-left" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <svg class="icon-left" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <svg class="icon-left" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        <input type="password" id="password" class="form-control" placeholder="........" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div class="auth-switch">
                Already have an account? <a href="/signin">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            sunIcon.style.display = isDark ? 'block' : 'none';
            moonIcon.style.display = isDark ? 'none' : 'block';
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, email, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.message === "User created successfully") window.location.href = '/';
                else alert(data.error || 'Signup failed');
            })
            .catch(err => alert('Connection error'));
        });
    </script>
</body>
</html>
